<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tandem Labs AI Agent</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: #fafafa;
  color: #1a1a1a;
  overflow-x: hidden;
}

.header {
  background: white;
  border-bottom: 1px solid #e5e5e5;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo {
  width: 32px;
  height: 32px;
  background: #dc2626;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 600;
  font-size: 14px;
}

.header-info h1 {
  margin: 0;
  font-size: 16px;
  font-weight: 600;
  color: #1a1a1a;
}

.header-info p {
  margin: 0;
  font-size: 12px;
  color: #666;
}

.status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: #059669;
}

.status-dot {
  width: 6px;
  height: 6px;
  background: #059669;
  border-radius: 50%;
}

.new-chat-btn {
  background: #f3f4f6;
  border: 1px solid #d1d5db;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  color: #6b7280;
  cursor: pointer;
  text-decoration: none;
}

.container {
  max-width: 100%;
  margin: 0 auto;
  height: calc(100vh - 57px);
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.msg-row {
  display: flex;
  gap: 8px;
  align-items: flex-start;
}

.msg-row.user {
  flex-direction: row-reverse;
}

.avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
}

.avatar.agent {
  background: #dc2626;
  color: white;
}

.avatar.user {
  background: #6b7280;
  color: white;
}

.bubble {
  max-width: calc(100% - 40px);
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.4;
}

.bubble.agent {
  background: white;
  border: 1px solid #e5e5e5;
}

.bubble.user {
  background: #1f2937;
  color: white;
  margin-left: auto;
}

.bubble p {
  margin: 0 0 8px 0;
}

.bubble p:last-child {
  margin-bottom: 0;
}

.suggestions {
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sug-btn {
  background: white;
  border: 1px solid #d1d5db;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  color: #374151;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}

.sug-btn:hover {
  background: #f9fafb;
  border-color: #9ca3af;
}

.input-area {
  background: white;
  border-top: 1px solid #e5e5e5;
  padding: 8px 12px;
}

.input-wrapper {
  display: flex;
  gap: 6px;
  align-items: flex-end;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 6px;
}

.input-wrapper:focus-within {
  border-color: #dc2626;
  box-shadow: 0 0 0 1px #dc2626;
}

.input {
  flex: 1;
  border: none;
  background: transparent;
  resize: none;
  font-size: 14px;
  line-height: 1.4;
  padding: 4px 6px;
  outline: none;
  max-height: 80px;
  min-height: 20px;
}

.send-btn {
  width: 28px;
  height: 28px;
  background: #dc2626;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.send-btn:disabled {
  background: #d1d5db;
  cursor: not-allowed;
}

.send-btn svg {
  width: 14px;
  height: 14px;
}

.input-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  color: #6b7280;
  padding: 4px 8px 0;
}

.char-count {
  color: #ef4444;
}

.error-note {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #dc2626;
  padding: 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-top: 6px;
}

.typing {
  display: flex;
  gap: 3px;
  padding: 12px;
}

.typing span {
  width: 4px;
  height: 4px;
  background: #9ca3af;
  border-radius: 50%;
  animation: typing 1.4s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 60%, 100% { opacity: 0.3; }
  30% { opacity: 1; }
}

.version {
  text-align: center;
  font-size: 10px;
  color: #9ca3af;
  padding: 8px;
  background: white;
}

/* Mobile optimizations */
@media (max-width: 480px) {
  .messages {
    padding: 6px 8px;
  }
  
  .bubble {
    font-size: 13px;
    padding: 6px 10px;
  }
  
  .suggestions {
    padding: 6px 8px;
    gap: 4px;
  }
  
  .sug-btn {
    padding: 6px 8px;
    font-size: 12px;
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">TL</div>
  <div class="header-info">
    <h1>Tandem Labs</h1>
    <p>We jump together. Then we unclip.</p>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    Live
  </div>
  <a href="#" class="new-chat-btn" onclick="clearConversation(); return false;">New chat</a>
</div>

<div class="container">
  <div class="messages" id="messages"></div>
  
  <div class="suggestions" id="suggestions">
    <!-- Suggestions will be added here -->
  </div>
  
  <div class="input-area">
    <div class="input-wrapper">
      <textarea 
        class="input" 
        id="input" 
        placeholder="What are you trying to build?"
        maxlength="2000"></textarea>
      <button class="send-btn" id="sendBtn" disabled aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter to send · Shift+Enter for new line</span>
      <span class="char-count" id="charCount"></span>
    </div>
    <div id="errorNote" class="error-note" style="display:none;"></div>
  </div>
</div>

<div class="version">Tandem Labs Agent v1.0.5</div>

<script>
// ─── SYSTEM PROMPT ────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are the Tandem Agent, the digital front door and diagnostic partner for Tandem Labs (TandemLabs.ai). Tandem Labs is an elite, AI-native custom software development agency and venture studio founded by five C-level executives: Jonathan Sasse, Jaime Solis, Cade Collister, Keegen Knapp, and Scott Davis.

Your goal is not to sell. Your goal is to be generous, diagnose the user's business bottleneck, and route them to one of three specific outcomes. You do this by determining if they have an idea that solves a real market problem, and if they have the validation and funding to execute it.

**[VOICE & TONE CONSTRAINTS]** You must speak using the "Jaime Solis Voice Profile".

- **The Vibe:** You are a thoughtful teacher-mentor. You speak down to the audience, but never *at* them. You smuggle a sharp idea inside a gentle delivery.
- **The Pacing:** Write with "screenplay pacing". Use short paragraphs. Use single-line sentences. Create white space.
- **The Phrasing:** Use the second person "you" to create intimacy. Ask Socratic questions to let the user fill in the blanks themselves.
- **The Sins (DO NOT DO THIS):** Never use fake hype or excessive exclamation points. Never use corporate jargon like "leverage," "alignment," "synergy," "fluff," or "filler". Never use emojis as structural formatting.

**[THE CORE METAPHOR: THE TANDEM JUMP]** If the user asks why we are called Tandem Labs, or how we work, explain the Tandem Jump.

- *The Script:* "We operate like a tandem skydive. You don't need to be an expert in the gear (the AI tools) or the aerodynamics (the technical architecture). We strap in with you. We jump together. We share the exact same goal—landing safely on the target. And once you're safely on the ground? We unclip and let you run."
- *The Anti-Retainer:* We do not do 12-month retainers. We do 60-day "Jumps". We come in, solve the problem for a fixed cost, and step back. We do not want clients dependent on us.

**[THE DIAGNOSTIC FLOW]** When a user begins a chat, you must gently discover their status by asking variations of these fundamental questions:

- "Who is this for, and what is it for?" (Do they have a defined product/idea?)
- "Have you validated this with the market, and do you have the funding to build it right?" (Are they just exploring, or are they ready to jump?)

**[ROUTING LOGIC: THE 3 OUTCOMES]** Based on their answers, gracefully route them to one of these three outcomes:

**Outcome 1: The Explorer (Not Ready)**
- *Trigger:* They have an idea, but no definition, no market validation, and no funding.
- *Action:* Do not pitch a 60-day Jump. Be generous. Recommend ONE specific issue of the *Red Threads* newsletter and ONE specific episode of the *Slackers Podcast* that fits their problem.
- *Example:* "It sounds like you have a great idea, but you are still figuring out exactly who it's for. We aren't the right fit for a full engagement right now, but we want to help you get unstuck. Listen to this specific episode of the Slackers Podcast, and read this issue of Red Threads. When you've validated the market, come back and we'll jump together."

**Outcome 2: The Builder (The $10K AI Assessment)**
- *Trigger:* They have built a prototype, but they are worried about security, scalability, and how well it is coded.
- *Action:* Pitch the $10K fixed-fee Assessment.
- *Example:* "You've already built the house; you just want to make sure the foundation isn't going to crack. We can help. We offer a 60-day 'Jump'—a fixed $10K AI Assessment. We get in, test the security and scale, apply the immediate fixes you need, and hand you back robust code so you can keep running. Plus, you get direct access to our team in Slack for 12 months."

**Outcome 3: The Accelerator (The $25K Sprint)**
- *Trigger:* They have a defined product, customer validation, and access to funding, but they lack the elite team to execute the strategy, design, and development.
- *Action:* Provide the calendar link to book a fit meeting. Pitch the $25K, 60-day Jump.
- *Example:* "You know exactly where you need to go; you just need the engine to get you there. This is exactly what we do. We do 60-day 'Jumps' for a fixed rate of $25K. We strap in with you, deliver the strategy, design, and development you are missing, and then we unclip so you can run. Let's schedule a time to meet with our five partners."

**[MOBILE RESPONSE GUIDELINES]**
- Keep responses under 150 words for mobile users
- Use short paragraphs and single-line sentences
- Ask one diagnostic question at a time
- Be conversational, not sales-y
- Focus on understanding their situation first
`;

// ─── SUGGESTIONS (Mapped to the 3 outcomes) ──────────────────────────────────
const SUGGESTIONS = [
  "I have an idea but don't know where to start",
  "I built something and I'm worried it won't scale", 
  "I have funding and validation — let's build"
];

let conversation = [];
let isLoading = false;

const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('input');
const sendBtn     = document.getElementById('sendBtn');
const suggestionsEl = document.getElementById('suggestions');
const errorNote   = document.getElementById('errorNote');
const charCount   = document.getElementById('charCount');

// ─── BUILD SUGGESTIONS ────────────────────────────────────────────────────────
SUGGESTIONS.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'sug-btn';
  btn.textContent = s;
  btn.onclick = () => {
    inputEl.value = s;
    autoResize();
    suggestionsEl.style.display = 'none';
    sendMessage();
  };
  suggestionsEl.appendChild(btn);
});

// ─── GREETING ─────────────────────────────────────────────────────────────────
setTimeout(() => {
  const greeting = `I'm here to figure out whether you need us to jump in with you for a 60-day sprint, or if you just need something to kick-start where you are now to get you unstuck today.

Let's start with the two questions that matter most.

Where are you at with your idea?`;
  addMessage('agent', greeting);
  conversation.push({ role: 'assistant', content: greeting });
}, 350);

// ─── INPUT HANDLING ───────────────────────────────────────────────────────────
inputEl.addEventListener('input', () => {
  autoResize();
  const len = inputEl.value.length;
  sendBtn.disabled = len === 0;
  charCount.textContent = len > 1800 ? `${len}/2000` : '';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled && !isLoading) sendMessage();
  }
});

sendBtn.addEventListener('click', () => { if (!isLoading) sendMessage(); });

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
}

// ─── ADD MESSAGE ──────────────────────────────────────────────────────────────
function addMessage(sender, text) {
  const row = document.createElement('div');
  row.className = `msg-row ${sender}`;
  
  const avatar = document.createElement('div');
  avatar.className = `avatar ${sender}`;
  avatar.textContent = sender === 'user' ? 'You' : 'TL';
  
  const bubble = document.createElement('div');
  bubble.className = `bubble ${sender}`;
  
  if (sender === 'agent') {
    // Split text into paragraphs and add them
    const paragraphs = text.split('\n').filter(p => p.trim());
    paragraphs.forEach(paragraph => {
      const p = document.createElement('p');
      p.textContent = paragraph;
      bubble.appendChild(p);
    });
  } else {
    bubble.textContent = text;
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row agent';
  row.id = 'typing-indicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar agent';
  avatar.textContent = 'TL';
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(avatar);
  row.appendChild(typing);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

// ─── CLEAR CONVERSATION ───────────────────────────────────────────────────────
function clearConversation() {
  conversation = [];
  messagesEl.innerHTML = '';
  suggestionsEl.style.display = 'flex';
  errorNote.style.display = 'none';
  setTimeout(() => {
    const greeting = `I'm here to figure out whether you need us to jump in with you for a 60-day sprint, or if you just need something to kick-start where you are now to get you unstuck today.

Let's start with the two questions that matter most.

Where are you at with your idea?`;
    addMessage('agent', greeting);
    conversation.push({ role: 'assistant', content: greeting });
  }, 350);
}

// ─── SEND MESSAGE ─────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  suggestionsEl.style.display = 'none';
  errorNote.style.display = 'none';

  inputEl.value = '';
  autoResize();
  sendBtn.disabled = true;
  charCount.textContent = '';

  addMessage('user', text);
  conversation.push({ role: 'user', content: text });

  isLoading = true;
  addTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversation
      })
    });

    removeTyping();

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const reply = data.content?.[0]?.text || "I hit a snag on my end — try again in a moment.";

    addMessage('agent', reply);
    conversation.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping();
    console.error('Tandem Labs AI error:', err);
    errorNote.textContent = `Something went wrong: ${err.message}. Check your connection and try again.`;
    errorNote.style.display = 'block';
    conversation.pop();
  }

  isLoading = false;
  // Only auto-focus on desktop — on mobile this triggers the keyboard
  // which covers the response the user just received
  if (!('ontouchstart' in window)) {
    inputEl.focus();
  }
}
</script>
</body>
</html>
